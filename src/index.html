<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>天和物流</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#f5f5f5;padding:16px}
.title{text-align:center;font-size:22px;margin:10px 0 20px;color:#222}
.input-box{margin-bottom:20px}
.label{font-size:17px;color:#333;margin-bottom:8px;display:block}
input,select{width:100%;padding:16px;border:1px solid #ddd;border-radius:10px;font-size:17px;background:#fff}
input:disabled{background:#eee;color:#666}
input.error {
  border:2px solid #ff3333 !important;
  background:#fff2f2 !important;
}
.btn-line{display:flex;gap:10px;margin:12px 0}
button{flex:1;padding:18px;border:none;border-radius:10px;font-size:17px;color:#fff;font-weight:500}
.btn-save{background:#009955}
.btn-export{background:#ff6600}
.btn-search-page{background:#1677ff;padding:18px;border-radius:10px;font-size:17px;color:#fff;width:100%}
.edit-btn{background:#1677ff;color:#fff;border:none;padding:10px 14px;border-radius:6px;font-size:15px;margin-top:8px;margin-right:6px}
.del-btn{background:#cc3333;color:#fff;border:none;padding:10px 14px;border-radius:6px;font-size:15px;margin-top:8px}
.list-box{margin-top:24px}
.list-title{font-size:18px;margin-bottom:12px}
.item-card{background:#fff;padding:16px;border-radius:10px;margin-bottom:12px;border:1px solid #eee}
.item-card p{font-size:16px;line-height:1.5;margin-bottom:8px}
.toast{
  position:fixed;bottom:30%;left:50%;transform:translate(-50%,0);
  background:#000000cc;color:#fff;padding:12px 24px;
  border-radius:8px;font-size:16px;display:none;z-index:9999;
}
.search-box{
  background:#fff;padding:14px;border-radius:10px;margin-top:24px;
  border:1px solid #eee;
}
.search-title{
  font-size:16px;font-weight:bold;margin-bottom:10px;color:#333;
}
.search-row{
  display:flex;gap:8px;margin-bottom:8px;
}
.search-row .input-box{
  flex:1;margin:0;
}
.btn-search{
  background:#1677ff;color:#fff;border:none;padding:14px;border-radius:8px;
  font-size:15px;margin-top:4px;width:100%;
}
.btn-reset{
  background:#999;color:#fff;border:none;padding:14px;border-radius:8px;
  font-size:15px;margin-top:4px;width:100%;
}
.modal-mask{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);display:none;z-index:999;
}
.modal-box{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:92%;max-width:400px;background:#fff;border-radius:12px;
  padding:16px;max-height:85vh;overflow-y:auto;
}
.modal-title{
  text-align:center;font-size:18px;margin-bottom:16px;
}
.btn-close{
  background:#999;color:#fff;border:none;padding:16px;
  border-radius:10px;width:100%;font-size:17px;margin-top:10px;
}
.back-btn{
  background:#999;color:#fff;padding:14px 16px;border-radius:8px;font-size:16px;margin-bottom:16px;width:100%
}
.export-result-btn{
  background:#ff6600;color:#fff;padding:16px;border-radius:10px;font-size:17px;width:100%;margin:10px 0;border:none;
}
.clear-all-btn{
  background:#cc3333;color:#fff;padding:16px;border-radius:10px;font-size:17px;width:100%;margin:10px 0;border:none;
}
.clear-search-btn{
  background:#ff4444;color:#fff;padding:16px;border-radius:10px;font-size:17px;width:100%;margin:10px 0;border:none;
}
</style>
</head>
<body>
<div class="toast" id="toast">提示</div>
<div class="modal-mask" id="editMask">
  <div class="modal-box">
    <div class="modal-title">修改单据</div>
    <div class="input-box">
      <span class="label">目的地</span>
      <select id="e_addr">
        <option value="西和">西和</option>
        <option value="礼县">礼县</option>
        <option value="盐官">盐官</option>
      </select>
    </div>
    <div class="input-box">
      <span class="label">货号</span>
      <input type="text" id="e_hno" onblur="checkHnoEdit()">
    </div>
    <div class="input-box">
      <span class="label">收件人</span>
      <input type="text" id="e_getNname" onblur="checkNameEdit()">
    </div>
    <div class="input-box">
      <span class="label">货名</span>
      <input type="text" id="e_name">
    </div>
    <div class="input-box">
      <span class="label">代收</span>
      <input type="number" id="e_daishou" oninput="formatMoney(this);calcEdit()" min="0">
    </div>
    <div class="input-box">
      <span class="label">提付</span>
      <input type="number" id="e_tifu" oninput="formatMoney(this);checkPayEdit();calcEdit()" min="0">
    </div>
    <div class="input-box">
      <span class="label">现付</span>
      <input type="number" id="e_xianfu" oninput="formatMoney(this);checkPayEdit();calcEdit()" min="0">
    </div>
    <div class="input-box">
      <span class="label">垫付</span>
      <input type="number" id="e_dianfu" oninput="formatMoney(this);calcEdit()" min="0">
    </div>
    <div class="input-box">
      <span class="label">回付</span>
      <input type="number" id="e_huifu" oninput="formatMoney(this);calcEdit()" min="0">
    </div>
    <div class="input-box">
      <span class="label">总运费</span>
      <input type="number" id="e_total" readonly>
    </div>
    <div class="input-box">
      <span class="label">送货费</span>
      <input type="number" id="e_song" oninput="formatMoney(this)" min="0">
    </div>
    <button class="btn-save" style="width:100%" onclick="saveEdit()">确认修改</button>
    <button class="btn-close" onclick="closeEdit()">关闭</button>
  </div>
</div>

<div class="modal-mask" id="exportTodayMask">
  <div class="modal-box">
    <div class="modal-title">导出今日货单</div>
    <div class="input-box">
      <span class="label">请选择目的地</span>
      <select id="exportTodayAddr">
        <option value="西和">西和</option>
        <option value="礼县">礼县</option>
        <option value="盐官">盐官</option>
      </select>
    </div>
    <button class="btn-export" style="width:100%" onclick="doExportToday()">确认导出</button>
    <button class="btn-close" onclick="closeExportToday()">取消</button>
  </div>
</div>

<div id="mainPage">
  <div class="title">天和物流 - 手机录单</div>
  <div class="input-box">
    <span class="label">目的地</span>
    <select id="addr">
      <option value="西和">西和</option>
      <option value="礼县">礼县</option>
      <option value="盐官">盐官</option>
    </select>
  </div>
  <div class="input-box">
    <span class="label">日期</span>
    <input type="date" id="date">
  </div>
  <div class="input-box">
    <span class="label">货号</span>
    <input type="text" id="hno" onblur="checkHno();checkTodayHnoRealTime()">
  </div>
  <div class="input-box">
    <span class="label">收件人</span>
    <input type="text" id="getNname" onblur="checkName()">
  </div>
  <div class="input-box">
    <span class="label">货名</span>
    <input type="text" id="name">
  </div>
  <div class="input-box">
    <span class="label">代收</span>
    <input type="number" id="daishou" oninput="formatMoney(this);calc()" min="0">
  </div>
  <div class="input-box">
    <span class="label">提付</span>
    <input type="number" id="tifu" oninput="formatMoney(this);checkPay();calc()" min="0">
  </div>
  <div class="input-box">
    <span class="label">现付</span>
    <input type="number" id="xianfu" oninput="formatMoney(this);checkPay();calc()" min="0">
  </div>
  <div class="input-box">
    <span class="label">垫付</span>
    <input type="number" id="dianfu" oninput="formatMoney(this);calc()" min="0">
  </div>
  <div class="input-box">
    <span class="label">回付</span>
    <input type="number" id="huifu" oninput="formatMoney(this);calc()" min="0">
  </div>
  <div class="input-box">
    <span class="label">总运费</span>
    <input type="number" id="total" readonly>
  </div>
  <div class="input-box">
    <span class="label">送货费</span>
    <input type="number" id="song" oninput="formatMoney(this)" min="0">
  </div>
  <div class="btn-line">
    <button class="btn-save" onclick="saveData()">保存单据</button>
    <button class="btn-export" onclick="openExportToday()">导出今日货单</button>
  </div>
  <button class="btn-search-page" onclick="goToSearch()">查询历史货单</button>
</div>

<div id="searchPage" style="display:none;padding-bottom:40px;">
  <button class="back-btn" onclick="goBack()">← 返回录单界面</button>
  <div class="title">单据查询</div>
  <div class="search-box">
    <div class="search-title">筛选条件</div>
    <div class="search-row">
      <div class="input-box">
        <span class="label" style="font-size:15px">目的地</span>
        <select id="s_addr" style="padding:12px;font-size:15px">
          <option value="">全部</option>
          <option value="西和">西和</option>
          <option value="礼县">礼县</option>
          <option value="盐官">盐官</option>
        </select>
      </div>
      <div class="input-box">
        <span class="label" style="font-size:15px">日期</span>
        <input type="date" id="s_date" style="padding:12px;font-size:15px">
      </div>
    </div>
    <button class="btn-search" onclick="searchData()">立即查询</button>
    <button class="btn-reset" onclick="resetSearch()">重置条件</button>
  </div>
  <button class="clear-search-btn" onclick="clearSearchResult()">删除当前查询的所有单据</button>
  <button class="clear-all-btn" onclick="clearAllFromSearch()">⚠️ 删除所有历史单据</button>
  <div id="searchResult" style="margin-top:20px;">
    <div id="resultList"></div>
  </div>
</div>

<script>
let dataList = JSON.parse(localStorage.getItem("tianheData")) || [];
let editIndex = -1;
let searchResultData = [];

window.onload = function(){
  let lastAddr = localStorage.getItem("lastAddr");
  if(lastAddr) document.getElementById("addr").value = lastAddr;
  setDefaultDate();
}

function setDefaultDate(){
  let d = new Date();
  let y = d.getFullYear();
  let m = (d.getMonth()+1).toString().padStart(2,'0');
  let day = d.getDate().toString().padStart(2,'0');
  let today = y+"-"+m+"-"+day;
  document.getElementById("date").value = today;
}

function getFormatDate(){
  let d = new Date(document.getElementById("date").value);
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}

function formatMoney(input){
  let val = input.value.replace(/[^\d.]/g, '');
  let parts = val.split('.');
  if(parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
  if(val.startsWith('.')) val = '0' + val;
  input.value = val;
}

function checkPay(){
  let t = document.getElementById("tifu");
  let x = document.getElementById("xianfu");
  if(t.value > 0){x.value=0;x.disabled=true}else{x.disabled=false}
  if(x.value > 0){t.value=0;t.disabled=true}else{t.disabled=false}
  calc();
}

function calc(){
  let a=Number(document.getElementById("daishou").value||0);
  let b=Number(document.getElementById("tifu").value||0);
  let c=Number(document.getElementById("xianfu").value||0);
  let d=Number(document.getElementById("dianfu").value||0);
  let e=Number(document.getElementById("huifu").value||0);
  document.getElementById("total").value = a+b+c+d+e;
}

function checkPayEdit(){
  let t = document.getElementById("e_tifu");
  let x = document.getElementById("e_xianfu");
  if(t.value > 0){x.value=0;x.disabled=true}else{x.disabled=false}
  if(x.value > 0){t.value=0;t.disabled=true}else{t.disabled=false}
  calcEdit();
}

function calcEdit(){
  let a=Number(document.getElementById("e_daishou").value||0);
  let b=Number(document.getElementById("e_tifu").value||0);
  let c=Number(document.getElementById("e_xianfu").value||0);
  let d=Number(document.getElementById("e_dianfu").value||0);
  let e=Number(document.getElementById("e_huifu").value||0);
  document.getElementById("e_total").value = a+b+c+d+e;
}

function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",1800);
}

function checkHno() {
  let inp = document.getElementById("hno");
  let val = inp.value.trim();
  inp.classList.remove("error");
  if (val === "") {
    inp.classList.add("error");
    showToast("货号不能为空");
    return false;
  }
  return true;
}

function checkTodayHnoRealTime(){
  let inp = document.getElementById("hno");
  let nowHno = inp.value.trim();
  if(!nowHno) return;
  let formatDate = getFormatDate();
  let todayList = dataList.filter(item=>item.date == formatDate);
  let hasRepeat = todayList.some(item=>item.hno == nowHno);
  if(hasRepeat){
    inp.classList.add("error");
    showToast("当天货号重复，请更换！");
  }else{
    inp.classList.remove("error");
  }
}

function checkName() {
  let inp = document.getElementById("getNname");
  let val = inp.value.trim();
  inp.classList.remove("error");
  if (val === "") {
    inp.classList.add("error");
    showToast("收件人不能为空");
    return false;
  }
  return true;
}

function checkHnoEdit() {
  let inp = document.getElementById("e_hno");
  let val = inp.value.trim();
  inp.classList.remove("error");
  if (val === "") {
    inp.classList.add("error");
    showToast("货号不能为空");
    return false;
  }
  return true;
}

function checkNameEdit() {
  let inp = document.getElementById("e_getNname");
  let val = inp.value.trim();
  inp.classList.remove("error");
  if (val === "") {
    inp.classList.add("error");
    showToast("收件人不能为空");
    return false;
  }
  return true;
}

function checkInputFinal() {
  let ok1 = checkHno();
  let ok2 = checkName();
  return ok1 && ok2;
}

function goToSearch(){
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("searchPage").style.display = "block";
  resetSearch();
  searchData();
}

function goBack(){
  document.getElementById("searchPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
}

function searchData(){
  let s_addr = document.getElementById("s_addr").value.trim();
  let s_date = document.getElementById("s_date").value;
  let filterDate = "";
  if(s_date){
    let d = new Date(s_date);
    filterDate = d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  }else{
    let d = new Date();
    filterDate = d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  }
  searchResultData = dataList.filter(item=>{
    let matchAddr = !s_addr || item.addr==s_addr;
    let matchDate = !filterDate || item.date==filterDate;
    return matchAddr && matchDate;
  });
  renderSearchResult();
}

function resetSearch(){
  document.getElementById("s_addr").value = "";
  document.getElementById("s_date").value = "";
  searchResultData = [];
  renderSearchResult();
}

function saveData(){
  if(!checkInputFinal()) return;
  let addr = document.getElementById("addr").value;
  localStorage.setItem("lastAddr",addr);
  let hno = document.getElementById("hno").value.trim();
  let item = {
    addr:addr,
    date:getFormatDate(),
    hno:hno,
    getNname:document.getElementById("getNname").value,
    name:document.getElementById("name").value,
    daishou:document.getElementById("daishou").value||0,
    tifu:document.getElementById("tifu").value||0,
    xianfu:document.getElementById("xianfu").value||0,
    dianfu:document.getElementById("dianfu").value||0,
    huifu:document.getElementById("huifu").value||0,
    total:document.getElementById("total").value||0,
    song:document.getElementById("song").value||0
  };
  dataList.push(item);
  localStorage.setItem("tianheData",JSON.stringify(dataList));
  clearInput();
  document.getElementById("hno").focus();
  showToast("录入完成");
  window.scrollTo(0,0);
}

function editItem(index){
  editIndex = index;
  let i = searchResultData[index];
  document.getElementById("e_addr").value = i.addr;
  document.getElementById("e_hno").value = i.hno;
  document.getElementById("e_getNname").value = i.getNname;
  document.getElementById("e_name").value = i.name;
  document.getElementById("e_daishou").value = i.daishou;
  document.getElementById("e_tifu").value = i.tifu;
  document.getElementById("e_xianfu").value = i.xianfu;
  document.getElementById("e_dianfu").value = i.dianfu;
  document.getElementById("e_huifu").value = i.huifu;
  document.getElementById("e_total").value = i.total;
  document.getElementById("e_song").value = i.song;
  checkPayEdit();
  document.getElementById("editMask").style.display="block";
}

function closeEdit(){
  document.getElementById("editMask").style.display="none";
}

function saveEdit(){
  if(editIndex<0)return;
  let hnoOk = checkHnoEdit();
  let nameOk = checkNameEdit();
  if(!hnoOk || !nameOk) return;
  let old = searchResultData[editIndex];
  let realIdx = dataList.findIndex(x=>
    x.date==old.date && x.hno==old.hno && x.addr==old.addr
  );
  if(realIdx==-1)return;
  dataList[realIdx]={
    addr:document.getElementById("e_addr").value,
    date:dataList[realIdx].date,
    hno:document.getElementById("e_hno").value.trim(),
    getNname:document.getElementById("e_getNname").value,
    name:document.getElementById("e_name").value,
    daishou:document.getElementById("e_daishou").value||0,
    tifu:document.getElementById("e_tifu").value||0,
    xianfu:document.getElementById("e_xianfu").value||0,
    dianfu:document.getElementById("e_dianfu").value||0,
    huifu:document.getElementById("e_huifu").value||0,
    total:document.getElementById("e_total").value||0,
    song:document.getElementById("e_song").value||0
  };
  localStorage.setItem("tianheData",JSON.stringify(dataList));
  closeEdit();
  searchData();
  showToast("修改完成");
}

function clearInput(){
  let lastAddr = localStorage.getItem("lastAddr");
  document.querySelectorAll("input:not([readonly]),select").forEach(i=>{
    i.value="";i.disabled=false;
    i.classList.remove("error");
  });
  if(lastAddr)document.getElementById("addr").value=lastAddr;
  setDefaultDate();
  calc();
}

function renderSearchResult(){
  let html = "";
  if(searchResultData.length>0){
    html += `<button class="export-result-btn" onclick="exportSearchResult()">导出货单</button>`;
  }
  searchResultData.forEach((item,idx)=>{
    html += `
    <div class="item-card">
      <p>目的地：${item.addr}</p>
      <p>日期：${item.date}</p>
      <p>货号：${item.hno}</p>
      <p>收件人：${item.getNname}</p>
      <p>总运费：${item.total}</p>
      <button class="edit-btn" onclick="editItem(${idx})">修改</button>
      <button class="del-btn" onclick="delItemFromSearch(${idx})">删除</button>
    </div>`;
  });
  if(searchResultData.length===0){
    html += `<p style="text-align:center;padding:20px;color:#666">暂无匹配数据</p>`;
  }
  document.getElementById("resultList").innerHTML = html;
}

function delItemFromSearch(index){
  let it=searchResultData[index];
  let real=dataList.findIndex(i=>
    i.date==it.date && i.hno==it.hno && i.addr==it.addr
  );
  if(real==-1)return;
  if(!confirm("确定删除？"))return;
  dataList.splice(real,1);
  localStorage.setItem("tianheData",JSON.stringify(dataList));
  searchData();
}

function openExportToday(){
  document.getElementById("exportTodayMask").style.display = "block";
}

function closeExportToday(){
  document.getElementById("exportTodayMask").style.display = "none";
}

function doExportToday(){
  let addr=document.getElementById("exportTodayAddr").value;
  let d = new Date();
  let td = d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  let list=dataList.filter(i=>i.addr==addr && i.date==td);
  if(list.length===0){showToast("今日无数据");return}
  doExport(list);
  closeExportToday();
}

function exportSearchResult(){
  if(searchResultData.length==0){showToast("无结果可导出");return}
  doExport(searchResultData);
}

function doExport(exportData){
  let first=exportData[0];
  let dateStr=first.date.replace(/[年月]/g,"-").replace("日","");
  let fileName=dateStr+first.addr+"货运单.xls";

  let sumDaishou=0,sumTifu=0,sumXianfu=0,sumDianfu=0,sumHuifu=0,sumTotal=0,sumSong=0;
  exportData.forEach(i=>{
    sumDaishou+=Number(i.daishou||0);
    sumTifu+=Number(i.tifu||0);
    sumXianfu+=Number(i.xianfu||0);
    sumDianfu+=Number(i.dianfu||0);
    sumHuifu+=Number(i.huifu||0);
    sumTotal+=Number(i.total||0);
    sumSong+=Number(i.song||0);
  });

  let html=`<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:"微软雅黑";font-size:11px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid #000;padding:6px 2px;text-align:center;font-size:10.5pt}
th{background:#f2f2f2}
.total-row{font-weight:bold;background:#f8f9fa}
.title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:8px}
.info-bar{display:flex;justify-content:space-between;margin-bottom:8px}
</style>
</head>
<body>

function clearSearchResult(){
  if(searchResultData.length === 0){
    showToast("暂无查询结果可删除");
    return;
  }
  if(!confirm("确定删除当前查询出的所有单据？")) return;
  searchResultData.forEach(item => {
    let idx = dataList.findIndex(i =>
      i.date === item.date && i.hno === item.hno && i.addr === item.addr
    );
    if(idx !== -1) dataList.splice(idx, 1);
  });
  localStorage.setItem("tianheData", JSON.stringify(dataList));
  searchData();
  showToast("已删除当前查询的所有单据");
}

function clearAllFromSearch(){
  if(!confirm("确定删除所有历史单据？此操作不可恢复！"))return;
  dataList = [];
  localStorage.setItem("tianheData", "[]");
  resetSearch();
  showToast("已删除所有单据");
}
